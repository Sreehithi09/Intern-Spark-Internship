<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header id="navbar">
  <div class="logo">NETFLIX</div>
  <div class="nav-right">
    <select>
      <option>English</option>
      <option>Hindi</option>
    </select>
    <button class="signin">Sign In</button>
  </div>
</header>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-content">
    <h1>Unlimited movies, shows, and more</h1>
    <h3>Starts at ₹149. Cancel at any time.</h3>
    <p>Ready to watch? Enter your email to create or restart your membership.</p>

    <div class="email-box">
      <input type="email" placeholder="Email address">
      <button>Get Started ></button>
    </div>
  </div>
</section>

<!-- Trending Section -->
<section class="movies">
  <h2>Trending Now</h2>
  <div class="movie-row">
    <div class="movie-card"><span>1</span><img src="https://picsum.photos/200/300?1"></div>
    <div class="movie-card"><span>2</span><img src="https://picsum.photos/200/300?2"></div>
    <div class="movie-card"><span>3</span><img src="https://picsum.photos/200/300?3"></div>
    <div class="movie-card"><span>4</span><img src="https://picsum.photos/200/300?4"></div>
    <div class="movie-card"><span>5</span><img src="https://picsum.photos/200/300?5"></div>
    <div class="movie-card"><span>6</span><img src="https://picsum.photos/200/300?6"></div>
  </div>
</section>

<!-- Action Movies Section -->
<section class="movies">
  <h2>Action Movies</h2>
  <div class="movie-row">
    <div class="movie-card"><img src="https://picsum.photos/200/300?7"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?8"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?9"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?10"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?11"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?12"></div>
  </div>
</section>

<!-- Comedy Movies Section -->
<section class="movies">
  <h2>Comedy Movies</h2>
  <div class="movie-row">
    <div class="movie-card"><img src="https://picsum.photos/200/300?13"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?14"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?15"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?16"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?17"></div>
    <div class="movie-card"><img src="https://picsum.photos/200/300?18"></div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
